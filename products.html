<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — Giftly</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎁</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
  <header class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">🎁 Giftly</a>
      <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="products.html" class="active">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html" class="cart-link">Cart <span id="cartCount" class="cart-count">0</span></a>
      </nav>
    </div>
  </header>

  <section class="page-header">
    <div class="container">
      <h1>All Gifts</h1>
      <p>Browse our curated collection</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <!-- Filters -->
      <div class="filters">
        <input type="text" id="searchInput" placeholder="Search gifts..." />
        <select id="categoryFilter">
          <option value="all">All Categories</option>
        </select>
        <select id="sortFilter">
          <option value="default">Sort by</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating">Top Rated</option>
        </select>
      </div>

      <div class="product-grid" id="productsGrid"></div>
      <p id="noResults" class="no-results" style="display:none">No products found.</p>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-grid">
      <div>
        <h3>🎁 Giftly</h3>
        <p>Thoughtful gifts, delivered with care.</p>
      </div>
      <div>
        <h4>Shop</h4>
        <a href="products.html">All Products</a>
        <a href="products.html">Categories</a>
      </div>
      <div>
        <h4>Company</h4>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div>
        <h4>Follow</h4>
        <a href="#">Instagram</a>
        <a href="#">Twitter</a>
        <a href="#">Facebook</a>
      </div>
    </div>
    <div class="footer-bottom">© 2026 Giftly. All rights reserved.</div>
  </footer>

  <div id="toast" class="toast"></div>

  <script src="js/imageData.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
