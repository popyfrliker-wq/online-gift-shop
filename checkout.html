<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Giftly</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎁</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
  <header class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">🎁 Giftly</a>
      <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html" class="cart-link">Cart <span id="cartCount" class="cart-count">0</span></a>
      </nav>
    </div>
  </header>

  <section class="page-header">
    <div class="container">
      <h1>Checkout</h1>
    </div>
  </section>

  <section class="section">
    <div class="container checkout-grid">
      <form id="checkoutForm" class="checkout-form" novalidate>
        <h2>Billing Details</h2>
        <div class="form-row">
          <label>Full Name<input type="text" name="name" required /></label>
          <label>Email<input type="email" name="email" required /></label>
        </div>
        <label>Phone<input type="tel" name="phone" required /></label>

        <h2>Shipping Address</h2>
        <label>Address<input type="text" name="address" required /></label>
        <div class="form-row">
          <label>City<input type="text" name="city" required /></label>
          <label>ZIP Code<input type="text" name="zip" required /></label>
        </div>
        <label>Country<input type="text" name="country" required /></label>

        <h2>Payment Method</h2>
        <div class="payment-options">
          <label><input type="radio" name="payment" value="card" checked /> Credit Card</label>
          <label><input type="radio" name="payment" value="paypal" /> PayPal</label>
          <label><input type="radio" name="payment" value="cod" /> Cash on Delivery</label>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Place Order</button>
      </form>

      <aside class="order-summary">
        <h2>Order Summary</h2>
        <div id="orderSummary"></div>
      </aside>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-grid">
      <div>
        <h3>🎁 Giftly</h3>
        <p>Thoughtful gifts, delivered with care.</p>
      </div>
      <div>
        <h4>Shop</h4>
        <a href="products.html">All Products</a>
        <a href="products.html">Categories</a>
      </div>
      <div>
        <h4>Company</h4>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div>
        <h4>Follow</h4>
        <a href="#">Instagram</a>
        <a href="#">Twitter</a>
        <a href="#">Facebook</a>
      </div>
    </div>
    <div class="footer-bottom">© 2026 Giftly. All rights reserved.</div>
  </footer>

  <div id="toast" class="toast"></div>

  <script src="js/imageData.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/checkout.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
